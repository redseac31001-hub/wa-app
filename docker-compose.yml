services:
  # ── wa-app 核心服务 ─────────────────────────────────────────────
  wa-app:
    image: ghcr.io/pood1e/wa-app-service:sha-49d8c83
    container_name: wa-app
    ports:
      - "50091:50091"   # gRPC 服务端口
      - "8080:8080"     # Dashboard HTTP 端口
    volumes:
      - wa-app-data:/var/lib/wa-app    # SQLite 数据持久化（未配置 PG/Redis 时使用）
    environment:
      # gRPC 监听地址（默认 :50091）
      - WA_APP_LISTEN_ADDR=:50091
      # Dashboard HTTP 监听地址（默认 :8080）
      - WA_APP_DASHBOARD_HTTP_ADDR=:8080
      # ── PostgreSQL（可选，不配置则降级为 SQLite） ──
      # - WA_APP_PG_DSN=postgres://wa-app:wa-app-password@postgres:5432/wa-app?sslmode=disable
      # ── Redis（可选，不配置则降级为 SQLite） ──
      # - WA_APP_REDIS_URL=redis://redis:6379/0
      # ── 全局出站代理（SOCKS5 / HTTP） ──
      # 所有 WA 网络请求（探测、注册、消息收发、长连接）都会通过此代理
      # 格式: socks5://user:pass@host:port 或 http://user:pass@host:port
      # - WA_COMMON_PROXY=http://user:pass@host:port
    restart: unless-stopped
    # depends_on:
    #   postgres:
    #     condition: service_started
    #   redis:
    #     condition: service_started


  # ── PostgreSQL（可选） ─────────────────────────────────────────
  # 取消下方注释并设置 WA_APP_PG_DSN 以启用 PostgreSQL 持久化
  # postgres:
  #   image: postgres:17-alpine
  #   container_name: wa-app-postgres
  #   environment:
  #     - POSTGRES_USER=wa-app
  #     - POSTGRES_PASSWORD=wa-app-password
  #     - POSTGRES_DB=wa-app
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   restart: unless-stopped

  # ── Redis（可选） ──────────────────────────────────────────────
  # 取消下方注释并设置 WA_APP_REDIS_URL 以启用 Redis 运行时状态
  # redis:
  #   image: redis:7-alpine
  #   container_name: wa-app-redis
  #   volumes:
  #     - redis-data:/data
  #   ports:
  #     - "6379:6379"
  #   restart: unless-stopped

volumes:
  wa-app-data:
  # postgres-data:
  # redis-data:
